<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>FALLING GHOST</title>

<!-- App icons / Add to Home Screen -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#eae2cf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Falling Ghost">
<meta name="application-name" content="Falling Ghost">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root { --canvas:#eae2cf; --canvas-2:#ded4bd; --ink:#1c1714; --ink-soft:#3a322c; --ink-dim:#8a7f70; --blue:#2a9fe6; --red:#d11f38; --pix:'Press Start 2P','Courier New',monospace; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--canvas); overflow:hidden; }
  body { display:flex; flex-direction:column; align-items:stretch; font-family:var(--pix); color:var(--ink); touch-action:none; user-select:none; }
  /* Werbebanner oben/unten: reservierter, sichtbarer Platz (zaehlt als Impression/CPM) */
  .adbar { flex:0 0 auto; display:flex; align-items:center; justify-content:center; width:100%;
           min-height:56px; background:var(--canvas-2); position:relative; z-index:6; overflow:hidden; }
  #adTop { border-bottom:1px solid rgba(28,23,20,.18); padding-top:env(safe-area-inset-top,0px); }
  #adBottom { border-top:1px solid rgba(28,23,20,.18); padding-bottom:env(safe-area-inset-bottom,0px); }
  .adbar .ad-slot { display:flex; align-items:center; justify-content:center; width:100%; max-width:728px;
                    min-height:50px; color:var(--ink-dim); font-family:var(--pix);
                    letter-spacing:.18em; text-transform:uppercase; font-size:12px; }
  /* Platzhalter-Optik (verschwindet, sobald echtes Ad-Snippet eingesetzt ist) */
  .ad-slot.placeholder { border:1px dashed rgba(28,23,20,.28); border-radius:2px; }
  .adbar .ad-label { position:absolute; top:2px; left:8px; font-family:var(--pix);
                     font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-dim); opacity:.7; }
  @media (min-width:760px){ .adbar { min-height:96px; } .adbar .ad-slot { min-height:90px; } }
  #play { flex:1 1 auto; display:flex; align-items:center; justify-content:center; min-height:0; }
  #stage { position:relative; width:100%; height:100%; max-width:520px; }
  canvas { display:block; width:100%; height:100%; background:var(--canvas); }
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px; gap:18px; transition:opacity .25s ease; }
  #over { background:radial-gradient(ellipse at center, rgba(234,226,207,.78), rgba(222,212,189,.93)); backdrop-filter:blur(1.5px); }
  #start { justify-content:space-between; padding:54px 32px 44px; background:linear-gradient(180deg, rgba(234,226,207,.92) 0%, rgba(234,226,207,.14) 28%, rgba(234,226,207,.10) 62%, rgba(234,226,207,.94) 100%); }
  .topblock,.botblock { display:flex; flex-direction:column; align-items:center; gap:14px; }
  .hidden { opacity:0; pointer-events:none; }
  .title { font-size:clamp(22px,7.2vw,40px); font-weight:400; letter-spacing:0; line-height:1.25; color:var(--ink); text-shadow:0 3px 0 rgba(28,23,20,.25); }
  .title em { font-style:normal; font-weight:400; color:var(--red); }
  .kicker { font-family:var(--pix); letter-spacing:.18em; text-transform:uppercase; font-size:8px; color:var(--ink-dim); }
  .sub { font-family:var(--pix); font-size:clamp(9px,2.6vw,12px); color:var(--ink-soft); max-width:26ch; line-height:1.9; }
  .hint { font-family:var(--pix); font-size:9px; line-height:1.8; color:var(--ink-dim); letter-spacing:0; }
  .pulse { animation:pulse 2.2s ease-in-out infinite; } @keyframes pulse { 0%,100%{opacity:.45} 50%{opacity:1} }
  .modes { display:flex; border:1px solid var(--ink); border-radius:2px; overflow:hidden; background:rgba(234,226,207,.4); }
  .modes button { font-family:var(--pix); font-size:9px; letter-spacing:0; text-transform:uppercase; background:transparent; color:var(--ink-soft); border:none; padding:11px 16px; cursor:pointer; }
  .modes button.on { background:var(--ink); color:var(--canvas); }
  .card { border:2px solid var(--ink); border-radius:0; padding:24px 26px; background:rgba(234,226,207,.7); display:flex; flex-direction:column; gap:10px; align-items:center; min-width:240px; box-shadow:6px 6px 0 rgba(28,23,20,.35); }
  .card .label { font-family:var(--pix); letter-spacing:.12em; text-transform:uppercase; font-size:9px; color:var(--ink-dim); }
  .card .depth { font-size:clamp(34px,11vw,56px); font-weight:400; color:var(--ink); line-height:1.1; }
  .card .depth span { font-size:.4em; color:var(--ink-dim); letter-spacing:0; }
  .card .meta { font-family:var(--pix); font-size:9px; line-height:1.7; color:var(--ink-dim); margin-top:4px; }
  .card .best { font-family:var(--pix); font-size:9px; color:var(--ink-dim); }
  .btnrow { display:flex; gap:10px; }
  .btn { font-family:var(--pix); font-size:10px; letter-spacing:0; text-transform:uppercase; background:rgba(234,226,207,.5); color:var(--ink); border:2px solid var(--ink); border-radius:0; padding:13px 20px; cursor:pointer; transition:all .12s ease; box-shadow:3px 3px 0 rgba(28,23,20,.35); }
  .btn:hover { border-color:var(--red); color:var(--red); }
  .btn.primary { background:var(--ink); color:var(--canvas); border-color:var(--ink); font-weight:600; }
  .btn.primary:hover { background:var(--red); border-color:var(--red); }
  /* Retro-Score-Box oben links */
  #hud { position:absolute; top:12px; left:12px; pointer-events:none; transition:transform .12s ease; z-index:4; }
  #hud.bump { transform:scale(1.12); }
  .scorebox { background:rgba(234,226,207,.88); border:2px solid var(--ink); padding:7px 10px 8px; display:inline-block; text-align:left; box-shadow:3px 3px 0 rgba(28,23,20,.4); }
  .scorebox .sl { font-family:var(--pix); font-size:8px; letter-spacing:.06em; color:var(--ink-soft); }
  .scorebox .sv { font-family:var(--pix); font-size:22px; line-height:1.2; color:var(--red); margin:3px 0 4px; }
  .scorebox .sb { font-family:var(--pix); font-size:8px; letter-spacing:.04em; color:var(--ink-dim); }
  #modeTag { position:absolute; top:44px; right:14px; font-family:var(--pix); font-size:8px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-dim); pointer-events:none; text-align:right; }
  #mute { position:absolute; top:12px; right:14px; font-family:var(--pix); font-size:8px; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft); background:rgba(234,226,207,.6); border:2px solid var(--ink); border-radius:0; padding:7px 9px; cursor:pointer; z-index:5; }
  /* Pixel-Logo unten links */
  #brand { position:absolute; left:12px; bottom:12px; pointer-events:none; font-family:var(--pix); line-height:1.15; z-index:4; text-shadow:2px 2px 0 rgba(28,23,20,.4); }
  #brand .b1 { font-size:13px; color:var(--ink); }
  #brand .b2 { font-size:13px; color:var(--red); }
  .toast { position:absolute; bottom:48px; left:50%; transform:translateX(-50%); font-family:var(--pix); font-size:9px; letter-spacing:.04em; color:var(--red); opacity:0; transition:opacity .3s ease; pointer-events:none; }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<!-- ============================ WERBUNG OBEN ============================
     Platzhalter-Banner. Verdient (CPM) sobald er sichtbar angezeigt wird.
     ECHTE WERBUNG EINBAUEN (z. B. Google AdSense):
       1) Im <head> einmalig laden:
          <script async crossorigin="anonymous"
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"></script>
       2) Diesen Platzhalter-Inhalt durch das Slot-Snippet ersetzen:
          <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
               data-ad-slot="OBEN_SLOT_ID" data-ad-format="auto" data-full-width-responsive="true"></ins>
       3) initAds() pusht den Slot automatisch (siehe Skript unten).
     Regeln: kein Auto-Refresh, keine Anreiz-Klicks, Banner sichtbar lassen. -->
<div id="adTop" class="adbar">
  <span class="ad-label">Werbung</span>
  <div class="ad-slot placeholder" id="adSlotTop" data-ad="top">Werbeplatz &middot; 320&times;50 / 728&times;90</div>
</div>

<main id="play">
<div id="stage">
  <canvas id="c"></canvas>
  <button id="mute">Klang an</button>
  <div id="hud" class="hidden">
    <div class="scorebox">
      <div class="sl">Score</div>
      <div class="sv"><span id="depth">0</span></div>
      <div class="sb">Beste: <span id="hudBest">0</span></div>
    </div>
  </div>
  <div id="brand" class="hidden"><div class="b1">FALLING</div><div class="b2">GHOST</div></div>
  <div id="modeTag" class="hidden"></div>
  <div class="toast" id="toast"></div>
  <div class="overlay" id="start">
    <div class="topblock">
      <div class="kicker">Ein Geist im Fallen</div>
      <div class="title">FALLING<em> GHOST</em></div>
    </div>
    <div class="botblock">
      <div class="hint pulse">Tippen zum Starten &middot; halten zum Steigen</div>
    </div>
  </div>
  <div class="overlay hidden" id="over">
    <div class="card">
      <div class="label" id="ovLabel">Zerlaufen</div>
      <div class="depth"><span id="ovDepth">0</span><span> m</span></div>
      <div class="meta" id="ovMeta"></div>
      <div class="best" id="ovBest"></div>
    </div>
    <div class="btnrow">
      <button class="btn primary" id="againBtn">Nochmal</button>
      <button class="btn" id="shareBtn">Teilen</button>
    </div>
    <div class="hint" id="ovHint">Tippen fuer sofortigen Neustart</div>
  </div>
</div>
</main>

<!-- ============================ WERBUNG UNTEN ============================
     Identisch zum oberen Banner. Slot-ID hier: UNTEN_SLOT_ID. -->
<div id="adBottom" class="adbar">
  <span class="ad-label">Werbung</span>
  <div class="ad-slot placeholder" id="adSlotBottom" data-ad="bottom">Werbeplatz &middot; 320&times;50 / 728&times;90</div>
</div>

  function hashN(i){let x=(i^rngSeed)>>>0;x=Math.imul(x^x>>>16,0x7feb352d);x=Math.imul(x^x>>>15,0x846ca68b);x^=x>>>16;return (x>>>0)/4294967296;}
  function vnoise(x){const i=Math.floor(x),f=x-i,u=f*f*(3-2*f),a=hashN(i),b=hashN(i+1);return a+(b-a)*u;}
  function fbm(x){let a=0,amp=0.5,fr=1,n=0;for(let o=0;o<4;o++){a+=amp*vnoise(x*fr);n+=amp;amp*=0.5;fr*=2.017;}return a/n;}
  function ridged(x){return 1-Math.abs(2*vnoise(x)-1);}
  // feine zerfranste Kante + gelegentliche Tropfen-Zungen in den Spalt (side:-1 oben,+1 unten)
  function surf(d,side){
    const ph=side<0?0:140.0;
    const fine=(fbm(d*CFG.fineF+ph)-0.5)*2*CFG.fineAmp*H;
    const mask=Math.max(0,fbm(d*CFG.dripMaskF+ph*0.5)-CFG.dripMaskTh)/(1-CFG.dripMaskTh);
    const drip=Math.pow(ridged(d*CFG.dripF+ph*2),CFG.dripSharp)*mask*CFG.dripAmp*H;
    return fine+drip;
  }
  function pulse(x){const s=Math.sin(x);return Math.max(0,s-CFG.bumpThresh)/(1-CFG.bumpThresh);}
  function centerLine(d){return (0.5 + CFG.elevAmp1*Math.sin(d*CFG.elevF1+P[0]) + CFG.elevAmp2*Math.sin(d*CFG.elevF2+P[1]) + CFG.elevAmp3*Math.sin(d*CFG.elevF3+P[2]))*H;}
  function halfBase(d){let w=CFG.widBase + CFG.widAmp1*Math.sin(d*CFG.widF1+P[3]) + CFG.widAmp2*Math.sin(d*CFG.widF2+P[4]); w=Math.min(CFG.widMax,Math.max(CFG.widMin,w)); return w*H;}
  function bumpTop(d){return (CFG.bumpAmp1*pulse(d*CFG.bumpF1a+P[5]) + CFG.bumpAmp2*pulse(d*CFG.bumpF2a+P[6]))*H;}
  function bumpBot(d){return (CFG.bumpAmp1*pulse(d*CFG.bumpF1b+P[7]) + CFG.bumpAmp2*pulse(d*CFG.bumpF2b+P[8]))*H;}
  function introK(d){ const introDist=CFG.introMeters*CFG.pxPerMeter; let k=Math.min(1,Math.max(0,d/introDist)); return k*k*(3-2*k); } // smoothstep: 0 am Start -> 1 nach Intro
  function edges(d){
    const k=introK(d);
    const dw=d+(fbm(d*CFG.warpF+50)-0.5)*2*CFG.warpAmp*k;        // Domain-Warping (eingeblendet)
    const cy=0.5*H*(1-k)+centerLine(dw)*k;
    const hb=(CFG.introHalf*H)*(1-k)+halfBase(dw)*k;
    let t=cy-hb+(bumpTop(dw)+surf(d,-1))*k;
    let b=cy+hb-(bumpBot(dw)+surf(d, 1))*k;
    const mc=CFG.minClear*H;
    if(b-t<mc){const m=(t+b)*0.5;t=m-mc*0.5;b=m+mc*0.5;}
    return {t,b};
  }
  // Menue-Waende = Spielstart-Waende (gleicher Spalt), damit der Uebergang nicht springt
  function menuEdges(d){return {t:(0.5-CFG.introHalf+0.012*Math.sin(d*0.004))*H, b:(0.5+CFG.introHalf-0.012*Math.sin(d*0.004+1.5))*H};}
  function biome(d){return 0.5+0.5*Math.sin(d*CFG.biomeFreq);}

  function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=stage.clientWidth;H=stage.clientHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);scale=H/800;}
  window.addEventListener('resize', resize);

  function press(){SND.init();SND.resume();if(state==='play'){ember.held=true;SND.thrust(true);}else start();}
  function release(){ember.held=false;SND.thrust(false);}
  cv.addEventListener('pointerdown',e=>{e.preventDefault();press();});
  window.addEventListener('pointerup',release);
  window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();press();}});
  window.addEventListener('keyup',e=>{if(e.code==='Space')release();});

  const $=id=>document.getElementById(id);
  function start(){
    initSeed();
    ember.dist=0;const e0=edges(0);ember.y=(e0.t+e0.b)*0.5;ember.vy=0;ember.held=false;
    speed=CFG.baseSpeed*scale;particles=[];trail=[];shake=0;wob=0;leanCur=0;
    camY=0;milestoneFlash=0;hitFlash=0;lastMile=0;timeScale=1;hitStop=0;wasNear=false;
    state='play';SND.enterPlay();
    $('start').classList.add('hidden');$('over').classList.add('hidden');$('hud').classList.remove('hidden');$('brand').classList.remove('hidden');$('hudBest').textContent=best[mode];
    const tag=$('modeTag');tag.classList.remove('hidden');tag.textContent=mode==='daily'?('Taeglich - '+shortDate()):'Endlos';
  }
  function shortDate(){const d=new Date();return d.getDate()+'.'+(d.getMonth()+1)+'.';}

  function die(){
    if(state!=='play')return;
    state='dead';hitStop=CFG.hitStopMs;hitFlash=1;SND.death();SND.leavePlay();
    const m=meters();if(m>best[mode])best[mode]=m;
    setTimeout(()=>{for(let i=0;i<36;i++){const ang=Math.random()*Math.PI*2,sp=Math.random()*5+1;particles.push({x:refX(),y:ember.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,r:Math.random()*3.6+1,red:Math.random()>0.45});}shake=18;},CFG.hitStopMs);
    setTimeout(showOver,560);
  }
  function showOver(){
    const m=meters();
    $('hud').classList.add('hidden');$('brand').classList.add('hidden');$('modeTag').classList.add('hidden');
    $('ovDepth').textContent=m;$('ovBest').textContent='Beste Strecke - '+best[mode]+' m';
    $('ovLabel').textContent=(m>=best[mode]&&m>0)?'Weiteste Strecke':'Zerlaufen';
    $('ovMeta').textContent=mode==='daily'?('Taeglicher Lauf - '+dailyKey):'Endlos-Modus';
    $('over').classList.remove('hidden');
  }
  function meters(){return Math.floor(ember.dist/CFG.pxPerMeter);}
  // Wandtextur-Wechsel per Strecke: blendet ab m0 ueber len Meter ein
  function wallFade(m0,len){ if(state==='menu')return 0; const m=ember.dist/CFG.pxPerMeter; return Math.min(1,Math.max(0,(m-m0)/len)); }

  function step(){
    if(state!=='play')return;
    const ay=ember.held?-CFG.thrustY:CFG.gravityY;
    ember.vy=(ember.vy+ay*scale)*CFG.drag;
    const mv=CFG.maxVY*scale;if(ember.vy>mv)ember.vy=mv;if(ember.vy<-mv)ember.vy=-mv;
    ember.y+=ember.vy;
    speed=Math.min(CFG.maxSpeed*scale,(CFG.baseSpeed+ember.dist*CFG.speedGain)*scale);
    ember.dist+=speed;
    trail.push({y:ember.y,dist:ember.dist});if(trail.length>CFG.trailMax)trail.shift();
    const e=edges(ember.dist),hit=CFG.emberR*CFG.hitboxMul*scale;
    const clr=Math.min(ember.y-e.t, e.b-ember.y);
    nearGlow=Math.min(1,Math.max(0,1-(clr-hit)/(CFG.nearMiss*scale)));
    timeScale=1-(1-CFG.slowmoFloor)*Math.max(0,nearGlow-0.45)/0.55;
    if(nearGlow>0.55&&!wasNear){SND.whoosh(nearGlow);wasNear=true;}else if(nearGlow<0.25)wasNear=false;
    if(ember.y-hit<e.t || ember.y+hit>e.b){die();return;}
    const mile=Math.floor(meters()/CFG.milestone);
    if(mile>lastMile){lastMile=mile;milestoneFlash=1;SND.chime();const h=$('hud');h.classList.add('bump');setTimeout(()=>h.classList.remove('bump'),140);}
    wob+=0.3;$('depth').textContent=meters();
  }

  function draw(){
    ensurePat();
    if(hitStop>0){ctx.save();bg();tunnel();inkTrail();character();ctx.restore();blot();return;}
    let sx=0,sy=0;if(shake>0){sx=(Math.random()-0.5)*shake;sy=(Math.random()-0.5)*shake;shake*=0.86;if(shake<0.4)shake=0;}
    const tcy=Math.max(-H*0.12,Math.min(H*0.12,-ember.vy*CFG.camLead));camY+=(tcy-camY)*0.1;
    ctx.save();ctx.translate(sx,sy+camY);
    bg();
    if(state==='menu'){ menuFrames(); heroGhost(); }
    else { tunnel();inkTrail();if(state==='play')character();parts(); }
    ctx.restore();
    const vg=ctx.createRadialGradient(W/2,H*0.5,H*0.25,W/2,H*0.5,H*0.85);
    vg.addColorStop(0,'rgba(40,60,90,0)');vg.addColorStop(1,'rgba(20,30,45,0.18)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    if(milestoneFlash>0.01){ctx.fillStyle='rgba(42,159,230,'+(milestoneFlash*0.10)+')';ctx.fillRect(0,0,W,H);milestoneFlash*=0.9;}
    if(nearGlow>0.4){ctx.fillStyle='rgba(42,159,230,'+((nearGlow-0.4)*0.16)+')';ctx.fillRect(0,0,W,H);}
  }

  function bg(){
    if(!bgImg.__r){ctx.fillStyle=cssv('--canvas');ctx.fillRect(-20,-40,W+40,H+80);return;}
    const dW=H*(bgImg.width/bgImg.height),period=dW*2;
    let off=(worldScroll()*CFG.bgParallax)%period;if(off<0)off+=period;
    let i=Math.floor(off/dW),x=-(off-i*dW),idx=i;
    while(x<W+1){
      if(idx%2!==0){ctx.save();ctx.translate(x,0);ctx.scale(-1,1);ctx.drawImage(bgImg,-dW,-1,dW,H+2);ctx.restore();}
      else ctx.drawImage(bgImg,x,-1,dW,H+2);
      x+=dW;idx++;
    }
  }

  function fillInk(pathFn, shadowY){
    ctx.save();
    pathFn();
    ctx.fillStyle='#0d0d12'; ctx.fill();
    ctx.clip();
    if(wallPat){ const off=worldScroll()%wallTileW; ctx.save(); ctx.translate(-off,0);
      ctx.fillStyle=wallPat; ctx.fillRect(-wallTileW,-40,W+wallTileW*2,H+80);
      const bf2=wallFade(600,40);   // ab 600m: blaue Wirbel-Textur
      if(bf2>0&&wallPat2){ ctx.globalAlpha=bf2; ctx.fillStyle=wallPat2; ctx.fillRect(-wallTileW,-40,W+wallTileW*2,H+80); ctx.globalAlpha=1; }
      const bf3=wallFade(1200,40);  // ab 1200m: leuchtend blaue Tropf-Textur
      if(bf3>0&&wallPat3){ ctx.globalAlpha=bf3; ctx.fillStyle=wallPat3; ctx.fillRect(-wallTileW,-40,W+wallTileW*2,H+80); ctx.globalAlpha=1; }
      ctx.restore(); }
    else { ctx.fillStyle='#0d0d12'; ctx.fillRect(-40,-40,W+80,H+80); }
    ctx.restore();
  }
  function tunnel(){
    const st=4;
    fillInk(()=>{ctx.beginPath();ctx.moveTo(-40,-40);ctx.lineTo(W+40,-40);for(let x=W+10;x>=-10;x-=st){const d=ember.dist+(x-refX());ctx.lineTo(x,edges(d).t);}ctx.closePath();}, 8*scale);
    fillInk(()=>{ctx.beginPath();ctx.moveTo(-40,H+40);ctx.lineTo(W+40,H+40);for(let x=W+10;x>=-10;x-=st){const d=ember.dist+(x-refX());ctx.lineTo(x,edges(d).b);}ctx.closePath();}, -8*scale);
    edge(-1);edge(1);
  }
  function menuFrames(){
    const st=8;
    fillInk(()=>{ctx.beginPath();ctx.moveTo(-40,-40);ctx.lineTo(W+40,-40);for(let x=W+10;x>=-10;x-=st){const d=menuScroll+(x-refX());ctx.lineTo(x,menuEdges(d).t);}ctx.closePath();}, 8*scale);
    fillInk(()=>{ctx.beginPath();ctx.moveTo(-40,H+40);ctx.lineTo(W+40,H+40);for(let x=W+10;x>=-10;x-=st){const d=menuScroll+(x-refX());ctx.lineTo(x,menuEdges(d).b);}ctx.closePath();}, -8*scale);
  }
  function edge(which){
    const st=4;ctx.beginPath();
    for(let x=-10;x<=W+10;x+=st){const d=ember.dist+(x-refX());const e=edges(d);const ye=which<0?e.t:e.b;if(x<=-10)ctx.moveTo(x,ye);else ctx.lineTo(x,ye);}
    if(nearGlow>0.01&&state==='play'){ctx.strokeStyle=cssv('--blue');ctx.globalAlpha=0.3+nearGlow*0.6;ctx.lineWidth=2+nearGlow*4;ctx.shadowColor=cssv('--blue');ctx.shadowBlur=14*nearGlow;ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;}
    ctx.strokeStyle='rgba(234,226,207,0.16)';ctx.lineWidth=1.4;ctx.stroke();
  }

  function inkTrail(){
    if(trail.length<2)return;const rx=refX();ctx.lineCap='round';ctx.lineJoin='round';
    for(let i=1;i<trail.length;i++){const a=trail[i-1],b=trail[i];const xa=rx-(ember.dist-a.dist),xb=rx-(ember.dist-b.dist);if(xb<-20)continue;const t=i/trail.length;ctx.strokeStyle='rgba(209,31,56,'+(0.03+t*0.16)+')';ctx.lineWidth=(0.6+t*3.0)*scale;ctx.beginPath();ctx.moveTo(xa,a.y);ctx.lineTo(xb,b.y);ctx.stroke();}
  }

  function character(){
    // Intro: startet in der Startszenen-Pose (mittig, gross) und gleitet zur Spielposition (refX, normal)
    const k=introK(ember.dist);
    const x=W*0.5+(refX()-W*0.5)*k, y=ember.y;
    const sc=(CFG.heroScale+(1-CFG.heroScale)*k)*scale; // 1.5x -> 1.0x
    if(!charImg.__r){ctx.fillStyle=cssv('--ink');ctx.beginPath();ctx.arc(x,y,9*scale,0,Math.PI*2);ctx.fill();return;}
    const hgt=CFG.spriteH*sc,wdt=hgt*(charImg.width/charImg.height);
    const target=Math.atan2(ember.vy*CFG.diveK,Math.max(0.001,speed))*k; // Kopf folgt der Flugbahn
    leanCur+=(target-leanCur)*CFG.leanEase; // Traegheit: nimmt den Trieb kurz mit, statt sofort zu kippen
    const lean=leanCur+Math.sin(wob*0.5)*0.02;
    ctx.save();ctx.translate(x,y);ctx.rotate(lean);if(CFG.faceFlip)ctx.scale(-1,1);
    if(k<1){const a=(1-k)*0.18;const ga=ctx.createRadialGradient(0,0,0,0,0,hgt*0.5);ga.addColorStop(0,'rgba(209,31,56,'+a+')');ga.addColorStop(1,'rgba(209,31,56,0)');ctx.fillStyle=ga;ctx.beginPath();ctx.arc(0,0,hgt*0.5,0,Math.PI*2);ctx.fill();}
    if(nearGlow>0.3){const g=ctx.createRadialGradient(0,0,0,0,0,hgt*0.4);g.addColorStop(0,'rgba(209,31,56,'+(nearGlow*0.4)+')');g.addColorStop(1,'rgba(209,31,56,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,hgt*0.4,0,Math.PI*2);ctx.fill();}
    ctx.drawImage(charImg,-wdt*0.5,-hgt*CFG.headFrac,wdt,hgt);
    ctx.restore();
  }

  function heroGhost(){
    if(!charImg.__r)return;
    const t=menuScroll*0.03;
    const x=W*0.5, y=H*0.5+Math.sin(t*0.9)*15*scale;
    const hgt=CFG.spriteH*CFG.heroScale*scale, wdt=hgt*(charImg.width/charImg.height);
    const sway=Math.sin(t*0.6)*0.05;
    const aura=0.16+0.06*Math.sin(t*1.3);
    const g=ctx.createRadialGradient(x,y,0,x,y,hgt*0.52);
    g.addColorStop(0,'rgba(209,31,56,'+aura+')');g.addColorStop(1,'rgba(209,31,56,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,hgt*0.52,0,Math.PI*2);ctx.fill();
    ctx.save();ctx.translate(x,y);ctx.rotate(sway);if(CFG.faceFlip)ctx.scale(-1,1);
    ctx.drawImage(charImg,-wdt*0.5,-hgt*CFG.headFrac,wdt,hgt);
    ctx.restore();
  }

  function parts(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life-=0.022;if(p.life<=0){particles.splice(i,1);continue;}ctx.globalAlpha=Math.min(1,p.life*1.4);ctx.fillStyle=p.red?cssv('--red'):cssv('--ink');ctx.beginPath();ctx.arc(p.x,p.y,p.r*(0.5+p.life*0.5),0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}

  function blot(){const x=refX(),y=ember.y+camY,prog=1-hitStop/CFG.hitStopMs,R=prog*72*scale;const g=ctx.createRadialGradient(x,y,0,x,y,R+1);g.addColorStop(0,'rgba(28,23,20,'+(hitFlash*0.85)+')');g.addColorStop(0.6,'rgba(120,20,35,'+(hitFlash*0.5)+')');g.addColorStop(1,'rgba(28,23,20,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,R+1,0,Math.PI*2);ctx.fill();hitFlash*=0.82;}

  const cc={};function cssv(v){if(!cc[v])cc[v]=getComputedStyle(document.documentElement).getPropertyValue(v).trim();return cc[v];}

  let last=performance.now(),acc=0;const STEP=1000/60;
  function loop(now){
    let dt=now-last;last=now;if(dt>250)dt=250;
    if(state==='menu')menuScroll+=0.7;
    if(hitStop>0){hitStop-=dt;if(hitStop<0)hitStop=0;draw();requestAnimationFrame(loop);return;}
    acc+=dt*timeScale;
    while(acc>=STEP){step();acc-=STEP;if(state!=='play')break;}
    draw();requestAnimationFrame(loop);
  }

  $('start').addEventListener('pointerdown',e=>{SND.init();SND.resume();start();ember.held=true;SND.thrust(true);});
  $('againBtn').addEventListener('click',e=>{e.stopPropagation();start();});
  $('mute').addEventListener('click',e=>{e.stopPropagation();SND.init();const m=!SND.isMuted();SND.setMute(m);e.target.textContent=m?'Klang aus':'Klang an';});
  $('shareBtn').addEventListener('click',e=>{e.stopPropagation();const m=meters();const txt=mode==='daily'?('FALLING GHOST - Taeglich '+dailyKey+'\nStrecke: '+m+' m\nSchaffst du es weiter?'):('FALLING GHOST - Endlos\nStrecke: '+m+' m');const t=$('toast');if(navigator.share){navigator.share({text:txt}).catch(()=>{});}else if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>{t.textContent='In Zwischenablage kopiert';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);});}});
  $('over').addEventListener('pointerdown',e=>{if(e.target.id==='over')start();});

  // --- Werbung: Platzhalter-Hook. Aktiviert vorhandene Ad-Slots.
  //     Solange nur Platzhalter da sind, passiert nichts (Spiel laeuft normal).
  //     Mit echtem AdSense-Snippet verdienen die Banner per Impression (CPM). ---
  function initAds(){
    try{
      const ins=document.querySelectorAll('ins.adsbygoogle');
      ins.forEach(()=>{ (window.adsbygoogle=window.adsbygoogle||[]).push({}); });
    }catch(e){ /* Werbung ist optional - Spiel laeuft auch ohne */ }
    resize(); // Layout nach evtl. Banner-Hoehenaenderung neu berechnen
  }

  initSeed();resize();initAds();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
